<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Piyush ♥ Saniya — Their Love Story</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.gstatic.com/s/nunito/v32/XRXV3I6Li01BKofIOuaBXso.woff2) format('woff2');
  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      :root {
        --rose: #ff2d6b;
        --gold: #ffd700;
        --purple: #8b5cf6;
        --pink: #ffb6c1;
        --bg: #0a0a18;
        --bg2: #12122a;
        --glass: rgba(255, 255, 255, 0.06);
        --border: rgba(255, 255, 255, 0.12);
        --cream: #fff8f0;
        --text: rgba(255, 255, 255, 0.88);
        --muted: rgba(255, 255, 255, 0.45);
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Nunito", sans-serif;
        min-height: 100vh;
        overflow-x: hidden;
        cursor: none;
      }
      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg);
      }
      ::-webkit-scrollbar-thumb {
        background: linear-gradient(var(--rose), var(--purple));
        border-radius: 2px;
      }

      /* Custom cursor */
      #cursor-dot {
        position: fixed;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--rose);
        pointer-events: none;
        z-index: 99999;
        transform: translate(-50%, -50%);
        filter: drop-shadow(0 0 15px var(--rose));
        transition:
          width 0.2s,
          height 0.2s,
          background 0.2s;
      }
      #cursor-ring {
        position: fixed;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 2px solid var(--rose);
        pointer-events: none;
        z-index: 99998;
        transform: translate(-50%, -50%);
        opacity: 0;
        transition:
          opacity 0.2s,
          width 0.3s,
          height 0.3s;
      }
      body.hovering #cursor-dot {
        width: 8px;
        height: 8px;
      }
      body.hovering #cursor-ring {
        opacity: 1;
      }

      .heart-trail {
        position: fixed;
        pointer-events: none;
        z-index: 99997;
        font-size: 14px;
        animation: heartFloat 1.2s ease-out forwards;
      }
      @keyframes heartFloat {
        0% {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
        100% {
          opacity: 0;
          transform: translateY(-60px) scale(0.5);
        }
      }

      /* Particle canvas */
      #particle-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        pointer-events: none;
      }

      /* Love meter */
      #love-meter {
        position: fixed;
        right: 16px;
        top: 50%;
        transform: translateY(-50%);
        z-index: 100;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
      }
      #love-meter-bar {
        width: 6px;
        height: 200px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 3px;
        overflow: hidden;
        position: relative;
      }
      #love-meter-fill {
        position: absolute;
        bottom: 0;
        width: 100%;
        background: linear-gradient(to top, var(--rose), var(--gold));
        border-radius: 3px;
        transition: height 0.3s ease;
      }
      #love-meter-heart {
        font-size: 16px;
        animation: pulse 1s infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.3);
        }
      }
      #love-meter-label {
        font-size: 8px;
        color: var(--rose);
        letter-spacing: 1px;
        writing-mode: vertical-rl;
        text-transform: uppercase;
      }

      /* Navbar */
      #navbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        background: rgba(10, 10, 24, 0.7);
        border-bottom: 1px solid var(--border);
        padding: 0 24px;
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .nav-logo {
        font-family: "Dancing Script", cursive;
        font-style: italic;
        font-weight: 700;
        font-size: 1.5rem;
        background: linear-gradient(135deg, var(--rose), var(--gold));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      @keyframes viz {
        from {
          transform: scaleY(0.3);
        }
        to {
          transform: scaleY(1);
        }
      }
      .nav-links {
        display: flex;
        gap: 4px;
        align-items: center;
      }
      .nav-link {
        background: none;
        border: none;
        color: var(--muted);
        font-family: "Nunito", sans-serif;
        font-size: 0.8rem;
        padding: 6px 10px;
        border-radius: 6px;
        cursor: none;
        transition:
          color 0.2s,
          background 0.2s;
        letter-spacing: 0.5px;
      }
      .nav-link:hover {
        color: var(--text);
        background: var(--glass);
      }
      .nav-link.active {
        color: var(--gold);
        text-shadow: 0 0 12px var(--gold);
      }
      .hamburger {
        display: none;
        background: none;
        border: none;
        color: var(--text);
        font-size: 1.5rem;
        cursor: none;
      }
      .mobile-drawer {
        display: none;
        position: fixed;
        top: 64px;
        left: 0;
        right: 0;
        background: rgba(10, 10, 24, 0.97);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--border);
        z-index: 999;
        padding: 16px;
        flex-direction: column;
        gap: 4px;
      }
      .mobile-drawer.open {
        display: flex;
      }
      .mobile-drawer .nav-link {
        font-size: 1rem;
        padding: 12px 16px;
      }

      /* Send Love button */
      #send-love-btn {
        position: fixed;
        bottom: 24px;
        left: 24px;
        z-index: 200;
        background: linear-gradient(135deg, var(--rose), var(--purple));
        border: none;
        border-radius: 50px;
        padding: 12px 20px;
        color: #fff;
        font-family: "Nunito", sans-serif;
        font-size: 0.85rem;
        cursor: none;
        box-shadow: 0 4px 20px rgba(255, 45, 107, 0.4);
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }
      #send-love-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 6px 30px rgba(255, 45, 107, 0.6);
      }

      /* Mute button */
      #mute-btn {
        position: fixed;
        bottom: 24px;
        right: 60px;
        z-index: 200;
        background: var(--glass);
        border: 1px solid var(--border);
        border-radius: 50%;
        width: 44px;
        height: 44px;
        color: var(--text);
        font-size: 1.2rem;
        cursor: none;
        backdrop-filter: blur(10px);
        transition: background 0.2s;
      }
      #mute-btn:hover {
        background: rgba(255, 255, 255, 0.12);
      }

      /* Page wrapper */
      .page {
        padding-top: 64px;
        min-height: 100vh;
        position: relative;
        z-index: 1;
      }
      .page-transition {
        animation: pageIn 0.5s ease forwards;
      }
      @keyframes pageIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Section containers */
      .section-container {
        max-width: 1100px;
        margin: 0 auto;
        padding: 40px 20px;
      }

      /* Glass card */
      .glass-card {
        background: var(--glass);
        border: 1px solid var(--border);
        border-radius: 16px;
        backdrop-filter: blur(10px);
      }

      /* Gradient text */
      .rose-gold {
        background: linear-gradient(
          135deg,
          var(--rose),
          var(--gold),
          var(--purple)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .shimmer {
        background: linear-gradient(
          90deg,
          var(--rose),
          var(--gold),
          var(--purple),
          var(--rose)
        );
        background-size: 300% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: shimmer 3s linear infinite;
      }
      @keyframes shimmer {
        to {
          background-position: 300% center;
        }
      }

      /* Profile photo circle */
      .photo-circle {
        border-radius: 50%;
        object-fit: cover;
        object-position: top;
        display: block;
      }

      /* Ticker */
      .ticker-wrap {
        overflow: hidden;
        background: rgba(255, 215, 0, 0.06);
        border-top: 1px solid rgba(255, 215, 0, 0.15);
        border-bottom: 1px solid rgba(255, 215, 0, 0.15);
        padding: 10px 0;
      }
      .ticker-track {
        display: inline-flex;
        gap: 60px;
        white-space: nowrap;
        animation: ticker 25s linear infinite;
      }
      .ticker-track:hover {
        animation-play-state: paused;
      }
      @keyframes ticker {
        from {
          transform: translateX(0);
        }
        to {
          transform: translateX(-50%);
        }
      }
      .ticker-item {
        font-family: "Nunito", sans-serif;
        font-size: 0.75rem;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--gold);
        font-weight: 500;
      }

      /* HOME */
      .hero {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        position: relative;
        overflow: hidden;
        padding: 80px 20px 40px;
      }
      .hero-bg {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(
            ellipse 80% 60% at 50% 50%,
            rgba(255, 45, 107, 0.18) 0%,
            rgba(139, 92, 246, 0.12) 40%,
            transparent 70%
          ),
          radial-gradient(
            ellipse 40% 40% at 20% 80%,
            rgba(255, 215, 0, 0.08) 0%,
            transparent 60%
          ),
          radial-gradient(
            ellipse 40% 40% at 80% 20%,
            rgba(139, 92, 246, 0.1) 0%,
            transparent 60%
          );
        z-index: 0;
      }
      .hero-content {
        position: relative;
        z-index: 1;
      }
      .hero-photos {
        display: flex;
        align-items: center;
        gap: 24px;
        justify-content: center;
        margin-bottom: 36px;
        flex-wrap: wrap;
      }
      .hero-photo-wrap {
        position: relative;
        width: 180px;
        height: 180px;
      }
      .hero-photo-ring {
        position: absolute;
        inset: -4px;
        border-radius: 50%;
        background: conic-gradient(
          var(--rose),
          var(--gold),
          var(--purple),
          var(--rose)
        );
        animation: spin 4s linear infinite;
      }
      .hero-photo-img {
        position: absolute;
        inset: 4px;
        border-radius: 50%;
        object-fit: cover;
        object-position: top;
        width: calc(100% - 8px);
        height: calc(100% - 8px);
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .hero-heart {
        font-size: 3.5rem;
        animation: heroHeart 2s ease-in-out infinite;
        filter: drop-shadow(0 0 20px var(--rose));
      }
      @keyframes heroHeart {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.2);
        }
      }
      .hero-title {
        font-family: "Dancing Script", cursive;
        font-style: italic;
        font-weight: 700;
        font-size: clamp(3rem, 8vw, 6rem);
        line-height: 1.1;
        margin-bottom: 16px;
      }
      .hero-subtitle {
        font-family: "Cinzel", serif;
        font-style: italic;
        font-size: clamp(1rem, 2.5vw, 1.4rem);
        color: var(--muted);
        margin-bottom: 40px;
      }
      .stats-bar {
        display: flex;
        gap: 16px;
        justify-content: center;
        flex-wrap: wrap;
        margin-bottom: 40px;
      }
      .stat-card {
        background: var(--glass);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 20px 28px;
        text-align: center;
        backdrop-filter: blur(10px);
        min-width: 140px;
      }
      .stat-num {
        font-family: "Dancing Script", cursive;
        font-size: 2rem;
        font-weight: 700;
        background: linear-gradient(135deg, var(--rose), var(--gold));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .stat-label {
        font-size: 0.75rem;
        color: var(--muted);
        letter-spacing: 1px;
        text-transform: uppercase;
        margin-top: 4px;
      }
      .hero-ctas {
        display: flex;
        gap: 16px;
        justify-content: center;
        flex-wrap: wrap;
        margin-bottom: 48px;
      }
      .btn-primary {
        padding: 14px 28px;
        border-radius: 50px;
        border: none;
        cursor: none;
        background: linear-gradient(135deg, var(--rose), var(--purple));
        color: #fff;
        font-family: "Nunito", sans-serif;
        font-size: 0.9rem;
        font-weight: 500;
        box-shadow: 0 4px 20px rgba(255, 45, 107, 0.4);
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }
      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 30px rgba(255, 45, 107, 0.6);
      }
      .btn-secondary {
        padding: 13px 28px;
        border-radius: 50px;
        cursor: none;
        background: transparent;
        border: 1px solid var(--rose);
        color: var(--rose);
        font-family: "Nunito", sans-serif;
        font-size: 0.9rem;
        font-weight: 500;
        transition:
          background 0.2s,
          transform 0.2s;
      }
      .btn-secondary:hover {
        background: rgba(255, 45, 107, 0.1);
        transform: translateY(-2px);
      }
      .floating-emoji {
        position: absolute;
        font-size: 1.8rem;
        animation: floatEmoji 6s ease-in-out infinite;
        pointer-events: none;
      }
      @keyframes floatEmoji {
        0%,
        100% {
          transform: translateY(0) rotate(0deg);
        }
        50% {
          transform: translateY(-30px) rotate(10deg);
        }
      }

      /* MEMORIES */
      .filter-tabs {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 24px;
      }
      .filter-tab {
        padding: 7px 16px;
        border-radius: 50px;
        border: 1px solid var(--border);
        background: var(--glass);
        color: var(--muted);
        font-family: "Nunito", sans-serif;
        font-size: 0.8rem;
        cursor: none;
        transition: all 0.2s;
      }
      .filter-tab.active,
      .filter-tab:hover {
        border-color: var(--rose);
        color: var(--rose);
        background: rgba(255, 45, 107, 0.1);
      }
      .memories-grid {
        columns: 3 280px;
        column-gap: 16px;
      }
      .memory-card {
        break-inside: avoid;
        margin-bottom: 16px;
        background: var(--glass);
        border: 1px solid var(--border);
        border-radius: 14px;
        overflow: hidden;
        cursor: none;
        transition:
          transform 0.3s,
          box-shadow 0.3s;
      }
      .memory-card:hover {
        transform: translateY(-6px);
        box-shadow: 0 12px 40px rgba(255, 45, 107, 0.25);
        border-color: rgba(255, 45, 107, 0.3);
      }
      .memory-card-inner {
        padding: 20px;
      }
      .memory-emoji {
        font-size: 2.5rem;
        margin-bottom: 12px;
        display: block;
      }
      .memory-title {
        font-family: "Dancing Script", cursive;
        font-style: italic;
        font-size: 1.1rem;
        margin-bottom: 8px;
        color: var(--cream);
      }
      .memory-desc {
        font-size: 0.85rem;
        color: var(--muted);
        line-height: 1.6;
      }
      .memory-tag {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 50px;
        font-size: 0.7rem;
        font-weight: 500;
        letter-spacing: 0.5px;
        margin-top: 10px;
      }

      /* Modal */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(10px);
        z-index: 2000;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        animation: fadeIn 0.3s ease;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      .modal-content {
        background: linear-gradient(135deg, var(--bg2), #1a0a2d);
        border: 1px solid var(--border);
        border-radius: 20px;
        max-width: 600px;
        width: 100%;
        max-height: 90vh;
        overflow-y: auto;
        padding: 32px;
        position: relative;
      }
      .modal-close {
        position: absolute;
        top: 16px;
        right: 16px;
        background: var(--glass);
        border: 1px solid var(--border);
        border-radius: 50%;
        width: 36px;
        height: 36px;
        color: var(--text);
        font-size: 1.1rem;
        cursor: none;
        transition: background 0.2s;
      }
      .modal-close:hover {
        background: rgba(255, 45, 107, 0.2);
      }

      /* TIMELINE */
      .timeline-wrap {
        max-width: 800px;
        margin: 0 auto;
        position: relative;
        padding: 20px 0;
      }
      .timeline-line {
        position: absolute;
        left: 50%;
        top: 0;
        bottom: 0;
        width: 2px;
        transform: translateX(-50%);
        background: linear-gradient(
          to bottom,
          var(--rose),
          var(--gold),
          var(--purple)
        );
      }
      .timeline-item {
        display: flex;
        margin-bottom: 60px;
        position: relative;
        opacity: 0;
        transition:
          opacity 0.6s ease,
          transform 0.6s ease;
      }
      .timeline-item.visible {
        opacity: 1 !important;
        transform: none !important;
      }
      .timeline-item:nth-child(odd) {
        flex-direction: row;
        transform: translateX(-40px);
      }
      .timeline-item:nth-child(even) {
        flex-direction: row-reverse;
        transform: translateX(40px);
      }
      .timeline-node {
        position: absolute;
        left: 50%;
        top: 20px;
        transform: translateX(-50%);
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: var(--bg2);
        border: 2px solid var(--rose);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        box-shadow: 0 0 20px rgba(255, 45, 107, 0.4);
        animation: nodeGlow 2s ease-in-out infinite;
        z-index: 2;
      }
      @keyframes nodeGlow {
        0%,
        100% {
          box-shadow: 0 0 20px rgba(255, 45, 107, 0.4);
        }
        50% {
          box-shadow: 0 0 35px rgba(255, 45, 107, 0.7);
        }
      }
      .timeline-card {
        width: calc(50% - 50px);
        perspective: 1000px;
      }
      .timeline-item:nth-child(odd) .timeline-card {
        margin-right: auto;
      }
      .timeline-item:nth-child(even) .timeline-card {
        margin-left: auto;
      }
      .timeline-card-inner {
        position: relative;
        min-height: 160px;
        transform-style: preserve-3d;
        transition: transform 0.6s;
        cursor: none;
        border-radius: 14px;
      }
      .timeline-card:hover .timeline-card-inner {
        transform: rotateY(180deg);
      }
      .timeline-card-front,
      .timeline-card-back {
        position: absolute;
        inset: 0;
        border-radius: 14px;
        padding: 24px;
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
        background: var(--glass);
        border: 1px solid var(--border);
        backdrop-filter: blur(10px);
      }
      .timeline-card-back {
        background: linear-gradient(
          135deg,
          rgba(255, 45, 107, 0.15),
          rgba(139, 92, 246, 0.15)
        );
        border-color: var(--rose);
        transform: rotateY(180deg);
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
      }
      .timeline-date {
        font-size: 0.75rem;
        color: var(--rose);
        letter-spacing: 1px;
        text-transform: uppercase;
        margin-bottom: 6px;
      }
      .timeline-title {
        font-family: "Dancing Script", cursive;
        font-style: italic;
        font-size: 1.1rem;
        margin-bottom: 8px;
        color: var(--cream);
      }
      .timeline-subtitle {
        font-family: "Cinzel", serif;
        font-style: italic;
        color: var(--gold);
        font-size: 0.95rem;
        margin-bottom: 10px;
      }
      .timeline-desc {
        font-size: 0.83rem;
        color: var(--muted);
        line-height: 1.6;
      }
      .timeline-quote {
        font-family: "Cinzel", serif;
        font-style: italic;
        font-size: 1.05rem;
        color: var(--rose);
      }

      /* CHAT */
      .chat-container {
        max-width: 700px;
        margin: 0 auto;
        padding: 20px;
      }
      .chat-header {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 20px;
        background: var(--glass);
        border: 1px solid var(--border);
        border-radius: 16px 16px 0 0;
        backdrop-filter: blur(10px);
      }
      .chat-avatar {
        position: relative;
        width: 72px;
        height: 72px;
        flex-shrink: 0;
      }
      .chat-avatar img {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        object-fit: cover;
        object-position: top;
        border: 2px solid var(--rose);
        box-shadow: 0 0 20px rgba(255, 45, 107, 0.4);
      }
      .online-dot {
        position: absolute;
        bottom: 4px;
        right: 4px;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #22c55e;
        border: 2px solid var(--bg2);
        animation: onlinePulse 2s ease-in-out infinite;
      }
      @keyframes onlinePulse {
        0%,
        100% {
          box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.6);
        }
        50% {
          box-shadow: 0 0 0 6px rgba(34, 197, 94, 0);
        }
      }
      .chat-name {
        font-family: "Dancing Script", cursive;
        font-style: italic;
        font-size: 1.2rem;
        color: var(--rose);
      }
      .chat-status {
        font-size: 0.8rem;
        color: var(--muted);
        margin-top: 2px;
      }
      .chat-messages {
        background: rgba(10, 10, 24, 0.8);
        border-left: 1px solid var(--border);
        border-right: 1px solid var(--border);
        min-height: 400px;
        max-height: 480px;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .chat-messages::-webkit-scrollbar {
        width: 3px;
      }
      .chat-messages::-webkit-scrollbar-thumb {
        background: var(--rose);
        border-radius: 2px;
      }
      .msg {
        display: flex;
        gap: 10px;
        animation: msgIn 0.3s ease;
      }
      @keyframes msgIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      .msg.user {
        flex-direction: row-reverse;
      }
      .msg-bubble {
        max-width: 70%;
        padding: 12px 16px;
        border-radius: 16px;
        font-size: 0.9rem;
        line-height: 1.5;
        position: relative;
      }
      .msg.user .msg-bubble {
        background: linear-gradient(135deg, var(--rose), var(--purple));
        color: #fff;
        border-bottom-right-radius: 4px;
      }
      .msg.saniya .msg-bubble {
        background: var(--glass);
        border: 1px solid var(--border);
        color: var(--text);
        border-bottom-left-radius: 4px;
        backdrop-filter: blur(10px);
      }
      .msg-avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        object-fit: cover;
        object-position: top;
        flex-shrink: 0;
      }
      .msg-time {
        font-size: 0.7rem;
        color: var(--muted);
        margin-top: 4px;
      }
      .msg.user .msg-time {
        text-align: right;
      }
      .typing-indicator {
        display: flex;
        gap: 10px;
        align-items: flex-end;
      }
      .typing-dots {
        display: flex;
        gap: 4px;
        padding: 12px 16px;
        background: var(--glass);
        border: 1px solid var(--border);
        border-radius: 16px;
        border-bottom-left-radius: 4px;
      }
      .typing-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--rose);
        animation: bounce 1s ease-in-out infinite;
      }
      .typing-dot:nth-child(2) {
        animation-delay: 0.15s;
      }
      .typing-dot:nth-child(3) {
        animation-delay: 0.3s;
      }
      @keyframes bounce {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-8px);
        }
      }
      .typing-label {
        font-size: 0.75rem;
        color: var(--muted);
        font-style: italic;
      }
      .quick-replies {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        padding: 12px 16px;
        background: rgba(10, 10, 24, 0.6);
        border-left: 1px solid var(--border);
        border-right: 1px solid var(--border);
      }
      .quick-reply {
        padding: 6px 12px;
        border-radius: 50px;
        border: 1px solid var(--border);
        background: var(--glass);
        color: var(--muted);
        font-size: 0.78rem;
        cursor: none;
        transition: all 0.2s;
      }
      .quick-reply:hover {
        border-color: var(--rose);
        color: var(--rose);
        background: rgba(255, 45, 107, 0.08);
      }
      .chat-input-area {
        background: rgba(10, 10, 24, 0.9);
        border: 1px solid var(--border);
        border-radius: 0 0 16px 16px;
        padding: 16px;
        display: flex;
        gap: 10px;
        align-items: flex-end;
        border-top: 1px solid var(--border);
      }
      .chat-textarea {
        flex: 1;
        background: var(--glass);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px;
        color: var(--text);
        font-family: "Nunito", sans-serif;
        font-size: 0.9rem;
        resize: none;
        max-height: 120px;
        overflow-y: auto;
        outline: none;
        transition: border-color 0.2s;
        min-height: 44px;
      }
      .chat-textarea:focus {
        border-color: var(--rose);
      }
      .chat-textarea::placeholder {
        color: var(--muted);
      }
      .emoji-btn,
      .send-btn {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        border: none;
        cursor: none;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: transform 0.2s;
      }
      .emoji-btn {
        background: var(--glass);
        border: 1px solid var(--border);
        font-size: 1.2rem;
      }
      .emoji-btn:hover {
        transform: scale(1.1);
      }
      .send-btn {
        background: linear-gradient(135deg, var(--rose), var(--purple));
        font-size: 1.1rem;
      }
      .send-btn:hover {
        transform: scale(1.1);
      }
      .emoji-picker {
        position: absolute;
        bottom: 100%;
        right: 0;
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px;
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        width: 250px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        z-index: 100;
      }
      .emoji-option {
        font-size: 1.3rem;
        cursor: none;
        padding: 4px;
        border-radius: 4px;
        transition: background 0.1s;
      }
      .emoji-option:hover {
        background: var(--glass);
      }

      /* NOTES */
      .notes-new-btn {
        border: 2px dashed var(--border);
        background: transparent;
        border-radius: 14px;
        padding: 24px;
        width: 100%;
        color: var(--muted);
        cursor: none;
        font-size: 0.9rem;
        transition: all 0.2s;
        font-family: "Nunito", sans-serif;
      }
      .notes-new-btn:hover {
        border-color: var(--rose);
        color: var(--rose);
      }
      .note-form {
        background: var(--glass);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 24px;
        backdrop-filter: blur(10px);
        margin-bottom: 20px;
      }
      .note-textarea {
        width: 100%;
        background: transparent;
        border: none;
        outline: none;
        font-family: "Cinzel", serif;
        font-style: italic;
        font-size: 1.1rem;
        color: var(--cream);
        resize: none;
        min-height: 100px;
        line-height: 1.6;
      }
      .note-textarea::placeholder {
        color: var(--muted);
      }
      .author-toggle {
        display: flex;
        gap: 8px;
        margin: 12px 0;
      }
      .author-btn {
        padding: 6px 16px;
        border-radius: 50px;
        border: 1px solid var(--border);
        background: transparent;
        cursor: none;
        font-size: 0.8rem;
        transition: all 0.2s;
      }
      .author-btn.piyush.active {
        border-color: #60a5fa;
        color: #60a5fa;
        background: rgba(96, 165, 250, 0.1);
      }
      .author-btn.saniya.active {
        border-color: var(--rose);
        color: var(--rose);
        background: rgba(255, 45, 107, 0.1);
      }
      .color-swatches {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
        flex-wrap: wrap;
      }
      .swatch {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        cursor: none;
        transition: transform 0.2s;
        border: 2px solid transparent;
      }
      .swatch.active {
        transform: scale(1.2);
        border-color: #fff;
      }
      .notes-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 16px;
      }
      .note-card {
        border-radius: 14px;
        padding: 20px;
        position: relative;
        overflow: hidden;
        cursor: none;
        transition:
          transform 0.3s,
          box-shadow 0.3s;
      }
      .note-card:hover {
        transform: rotate(0deg) translateY(-4px);
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
      }
      .note-watermark {
        position: absolute;
        bottom: -10px;
        right: -5px;
        font-size: 4rem;
        opacity: 0.06;
        pointer-events: none;
      }
      .note-text {
        font-family: "Cinzel", serif;
        font-style: italic;
        font-size: 1rem;
        line-height: 1.6;
        margin-bottom: 12px;
        position: relative;
        z-index: 1;
      }
      .note-author {
        font-size: 0.7rem;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.5);
        font-variant: small-caps;
        position: relative;
        z-index: 1;
      }

      /* PROMISES */
      .promise-ring-wrap {
        display: flex;
        justify-content: center;
        margin-bottom: 32px;
      }
      .promise-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .promise-item {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 16px 20px;
        background: var(--glass);
        border: 1px solid var(--border);
        border-radius: 12px;
        cursor: none;
        transition: all 0.2s;
      }
      .promise-item.done {
        border-color: rgba(34, 197, 94, 0.4);
        background: rgba(34, 197, 94, 0.05);
      }
      .promise-icon {
        font-size: 1.4rem;
        flex-shrink: 0;
      }
      .promise-text {
        flex: 1;
        font-size: 0.9rem;
        line-height: 1.4;
      }
      .promise-check {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 2px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: all 0.2s;
      }
      .promise-item.done .promise-check {
        background: #22c55e;
        border-color: #22c55e;
        color: #fff;
      }
      .promise-add {
        display: flex;
        gap: 12px;
        margin-top: 24px;
      }
      .promise-input {
        flex: 1;
        background: var(--glass);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px;
        color: var(--text);
        font-family: "Nunito", sans-serif;
        outline: none;
        transition: border-color 0.2s;
      }
      .promise-input:focus {
        border-color: var(--rose);
      }
      .promise-input::placeholder {
        color: var(--muted);
      }

      /* MUSIC */
      .music-card {
        max-width: 480px;
        margin: 0 auto;
        padding: 32px;
        background: var(--glass);
        border: 1px solid var(--border);
        border-radius: 20px;
        backdrop-filter: blur(20px);
      }
      .album-art {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        margin: 0 auto 20px;
        background: conic-gradient(
          var(--rose),
          var(--gold),
          var(--purple),
          var(--rose)
        );
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.8rem;
        box-shadow: 0 0 30px rgba(255, 45, 107, 0.4);
      }
      .album-art.playing {
        animation: spin 3s linear infinite;
      }
      .song-title {
        font-family: "Dancing Script", cursive;
        font-style: italic;
        font-size: 1.2rem;
        text-align: center;
        margin-bottom: 4px;
      }
      .song-artist {
        font-size: 0.8rem;
        color: var(--muted);
        text-align: center;
        margin-bottom: 20px;
      }
      .progress-bar {
        height: 4px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 2px;
        cursor: none;
        position: relative;
        margin-bottom: 8px;
      }
      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--rose), var(--gold));
        border-radius: 2px;
        transition: width 0.1s;
      }
      .time-row {
        display: flex;
        justify-content: space-between;
        font-size: 0.75rem;
        color: var(--muted);
        margin-bottom: 20px;
      }
      .controls {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 16px;
        margin-bottom: 20px;
      }
      .ctrl-btn {
        background: none;
        border: none;
        color: var(--text);
        font-size: 1.4rem;
        cursor: none;
        transition: transform 0.2s;
        padding: 8px;
      }
      .ctrl-btn:hover {
        transform: scale(1.1);
      }
      .ctrl-btn.play {
        width: 54px;
        height: 54px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--rose), var(--purple));
        font-size: 1.2rem;
        box-shadow: 0 4px 20px rgba(255, 45, 107, 0.4);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .visualizer {
        display: flex;
        align-items: flex-end;
        justify-content: center;
        gap: 4px;
        height: 40px;
        margin-bottom: 16px;
      }
      .viz-bar {
        width: 6px;
        border-radius: 3px;
        background: linear-gradient(to top, var(--rose), var(--gold));
        animation: vizPulse 0.8s ease-in-out infinite alternate;
      }
      @keyframes vizPulse {
        to {
          transform: scaleY(0.2);
        }
        from {
          transform: scaleY(1);
        }
      }
      .volume-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 24px;
      }
      .volume-slider {
        flex: 1;
        accent-color: var(--rose);
        cursor: none;
      }
      .playlist {
        border-top: 1px solid var(--border);
        padding-top: 20px;
      }
      .playlist-title {
        font-size: 0.75rem;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 12px;
      }
      .playlist-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 12px;
        border-radius: 10px;
        cursor: none;
        transition: background 0.2s;
      }
      .playlist-item:hover {
        background: var(--glass);
      }
      .playlist-item.active {
        background: rgba(255, 45, 107, 0.1);
      }
      .playlist-num {
        font-size: 0.8rem;
        color: var(--muted);
        width: 20px;
      }
      .playlist-item.active .playlist-num {
        color: var(--rose);
      }
      .playlist-name {
        flex: 1;
        font-size: 0.87rem;
      }
      .playlist-dur {
        font-size: 0.75rem;
        color: var(--muted);
      }

      /* COUNTDOWN */
      .countdown-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
        gap: 16px;
        margin-bottom: 32px;
      }
      .countdown-unit {
        background: var(--glass);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 20px;
        text-align: center;
        backdrop-filter: blur(10px);
      }
      .countdown-num {
        font-family: "Dancing Script", cursive;
        font-size: 2.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, var(--rose), var(--gold));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 8px;
      }
      .countdown-unit-label {
        font-size: 0.75rem;
        color: var(--muted);
        letter-spacing: 1px;
        text-transform: uppercase;
      }

      /* QUIZ */
      .quiz-card {
        max-width: 560px;
        margin: 0 auto;
        padding: 32px;
        background: var(--glass);
        border: 1px solid var(--border);
        border-radius: 20px;
        backdrop-filter: blur(20px);
      }
      .quiz-progress-bar {
        height: 4px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 2px;
        margin-bottom: 8px;
      }
      .quiz-progress-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--rose), var(--gold));
        border-radius: 2px;
        transition: width 0.4s;
      }
      .quiz-label {
        font-size: 0.75rem;
        color: var(--muted);
        text-align: right;
        margin-bottom: 20px;
      }
      .quiz-question {
        font-family: "Dancing Script", cursive;
        font-style: italic;
        font-size: 1.2rem;
        margin-bottom: 24px;
        line-height: 1.5;
      }
      .quiz-options {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .quiz-option {
        padding: 14px 18px;
        background: var(--glass);
        border: 1px solid var(--border);
        border-radius: 12px;
        text-align: left;
        cursor: none;
        font-family: "Nunito", sans-serif;
        font-size: 0.9rem;
        color: var(--text);
        transition: all 0.2s;
      }
      .quiz-option:hover:not(:disabled) {
        border-color: var(--rose);
        background: rgba(255, 45, 107, 0.08);
      }
      .quiz-option.correct {
        border-color: #22c55e;
        background: rgba(34, 197, 94, 0.1);
        color: #22c55e;
      }
      .quiz-option.wrong {
        border-color: #ef4444;
        background: rgba(239, 68, 68, 0.1);
        color: #ef4444;
      }
      .quiz-result {
        text-align: center;
        padding: 20px;
      }
      .quiz-result-emoji {
        font-size: 3rem;
        margin-bottom: 16px;
      }
      .quiz-result-msg {
        font-family: "Cinzel", serif;
        font-style: italic;
        font-size: 1.2rem;
        line-height: 1.6;
        margin-bottom: 20px;
      }

      .milestones {
        display: flex;
        flex-direction: column;
        gap: 10px;
        max-width: 500px;
        margin: 0 auto 32px;
      }
      .milestone {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 16px;
        background: var(--glass);
        border: 1px solid var(--border);
        border-radius: 10px;
      }
      .milestone.passed {
        border-color: rgba(255, 215, 0, 0.3);
      }
      .milestone-label {
        flex: 1;
        font-size: 0.87rem;
      }
      .milestone.passed .milestone-label {
        color: var(--gold);
      }
      .milestone-status {
        font-size: 0.8rem;
        color: var(--muted);
      }
      .milestone.passed .milestone-status {
        color: var(--gold);
      }
      .love-fact {
        max-width: 500px;
        margin: 0 auto;
        text-align: center;
        padding: 24px;
        background: var(--glass);
        border: 1px solid var(--border);
        border-radius: 14px;
        font-family: "Cinzel", serif;
        font-style: italic;
        font-size: 1.1rem;
        line-height: 1.6;
        color: var(--muted);
        transition: opacity 0.5s;
      }

      /* Fireworks canvas */
      #fireworks-canvas {
        position: fixed;
        inset: 0;
        z-index: 500;
        pointer-events: none;
        display: none;
      }

      /* Konami overlay */
      #konami-overlay {
        position: fixed;
        inset: 0;
        z-index: 3000;
        background: rgba(0, 0, 0, 0.95);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        cursor: none;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.5s;
      }
      #konami-overlay.active {
        opacity: 1;
        pointer-events: all;
      }
      #konami-title {
        font-family: "Dancing Script", cursive;
        font-style: italic;
        font-weight: 700;
        font-size: clamp(2rem, 6vw, 4rem);
        text-align: center;
        background: linear-gradient(
          135deg,
          var(--rose),
          var(--gold),
          var(--purple)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 12px;
      }
      #konami-sub {
        font-family: "Cinzel", serif;
        font-style: italic;
        font-size: 1.4rem;
        color: var(--muted);
      }
      #konami-hearts {
        position: absolute;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
      }

      /* Tutorial Overlay */
      .tutorial-overlay {
        position: fixed;
        inset: 0;
        z-index: 2500;
        background: rgba(0, 0, 0, 0.7);
        display: flex;
        align-items: center;
        justify-content: center;
        animation: fadeIn 0.3s ease;
      }
      .tutorial-highlight {
        position: fixed;
        border: 3px solid rgba(255, 215, 0, 0.8);
        border-radius: 12px;
        box-shadow:

      // ============================================================
      // PARTICLE CANVAS ENGINE
      // ============================================================
      function initParticleCanvas() {
        const canvas = document.getElementById("particle-canvas");
        const ctx = canvas.getContext("2d");
        let W = window.innerWidth,
          H = window.innerHeight;
        canvas.width = W;
        canvas.height = H;

        const resize = () => {
          W = window.innerWidth;
          H = window.innerHeight;
          canvas.width = W;
          canvas.height = H;
        };
        window.addEventListener("resize", resize);

        const stars = Array.from({ length: 150 }, () => ({
          x: Math.random() * W,
          y: Math.random() * H,
          r: Math.random() * 1.5 + 0.3,
          opacity: Math.random(),
          speed: Math.random() * 0.015 + 0.005,
          phase: Math.random() * Math.PI * 2,
        }));

        const bokeh = Array.from({ length: 8 }, () => ({
          x: Math.random() * W,
          y: Math.random() * H,
          r: Math.random() * 80 + 40,
          opacity: Math.random() * 0.04 + 0.02,
          dx: (Math.random() - 0.5) * 0.2,
          dy: (Math.random() - 0.5) * 0.1,
          color: Math.random() > 0.5 ? [255, 45, 107] : [139, 92, 246],
        }));

        let t = 0;
        const render = () => {
          ctx.clearRect(0, 0, W, H);
          // nebula corners
          const g1 = ctx.createRadialGradient(0, H, 0, 0, H, 300);
          g1.addColorStop(0, "rgba(255,45,107,0.06)");
          g1.addColorStop(1, "transparent");
          ctx.fillStyle = g1;
          ctx.fillRect(0, 0, W, H);
          const g2 = ctx.createRadialGradient(W, 0, 0, W, 0, 300);
          g2.addColorStop(0, "rgba(139,92,246,0.06)");
          g2.addColorStop(1, "transparent");
          ctx.fillStyle = g2;
          ctx.fillRect(0, 0, W, H);

          // bokeh
          bokeh.forEach((b) => {
            b.x += b.dx;
            b.y += b.dy;
            if (b.x < -b.r) b.x = W + b.r;
            if (b.x > W + b.r) b.x = -b.r;
            if (b.y < -b.r) b.y = H + b.r;
            if (b.y > H + b.r) b.y = -b.r;
            const g = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
            g.addColorStop(
              0,
              `rgba(${b.color[0]},${b.color[1]},${b.color[2]},${b.opacity})`,
            );
            g.addColorStop(1, "transparent");
            ctx.fillStyle = g;
            ctx.beginPath();
            ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
            ctx.fill();
          });

          // stars
          stars.forEach((s) => {
            const op = ((Math.sin(t * s.speed + s.phase) + 1) / 2) * 0.8 + 0.1;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255,255,255,${op})`;
            ctx.fill();
          });
          t++;
          requestAnimationFrame(render);
        };
        render();
      }

      // ============================================================
      // FIREWORKS ENGINE
      // ============================================================
      let fireworksActive = false;
      function launchFireworks() {
        const canvas = document.getElementById("fireworks-canvas");
        canvas.style.display = "block";
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const particles = [];
        const colors = ["#FF2D6B", "#FFD700", "#8B5CF6", "#FFB6C1", "#fff"];

        for (let b = 0; b < 8; b++) {
          setTimeout(() => {
            const x = Math.random() * canvas.width * 0.8 + canvas.width * 0.1;
            const y = Math.random() * canvas.height * 0.5 + canvas.height * 0.1;
            for (let i = 0; i < 60; i++) {
              const angle = ((Math.PI * 2) / 60) * i;
              const speed = Math.random() * 6 + 2;
              particles.push({
                x,
                y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                life: 1,
                decay: Math.random() * 0.015 + 0.01,
                color: colors[Math.floor(Math.random() * colors.length)],
                size: Math.random() * 3 + 1,
              });
            }
          }, b * 400);
        }

        let frame = 0;
        const animate = () => {
          ctx.fillStyle = "rgba(10,10,24,0.15)";
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.12;
            p.vx *= 0.98;
            p.life -= p.decay;
            if (p.life <= 0) {
              particles.splice(i, 1);
              continue;
            }
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.globalAlpha = 1;
          frame++;
          if (frame < 300) requestAnimationFrame(animate);
          else {
            canvas.style.display = "none";
            ctx.clearRect(0, 0, canvas.width, canvas.height);
          }
        };
        animate();
      }

      // ============================================================
      // WEB AUDIO MUSIC ENGINE
      // ============================================================
      let audioCtx = null,
        gainNode = null,
        oscNodes = [],
        lfoNode = null,
        lfoGain = null;
      let musicStarted = false,
        musicMuted = false;

      function startAmbientMusic() {
        if (musicStarted) return;
        musicStarted = true;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        gainNode = audioCtx.createGain();
        gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
        gainNode.gain.linearRampToValueAtTime(0.06, audioCtx.currentTime + 2);
        gainNode.connect(audioCtx.destination);

        // Am7→Fmaj7→Cmaj7→G chord progression (sine oscillators)
        const chords = [
          [220, 261.63, 329.63, 392], // Am7
          [174.61, 220, 261.63, 349.23], // Fmaj7
          [261.63, 329.63, 392, 523.25], // Cmaj7
          [196, 246.94, 293.66, 392], // G
        ];

        let chordIdx = 0;
        const playChord = () => {
          oscNodes.forEach((o) => {
            try {
              o.stop();
            } catch (e) {}
          });
          oscNodes = [];
          chords[chordIdx].forEach((freq) => {
            const osc = audioCtx.createOscillator();
            const og = audioCtx.createGain();
            osc.type = "sine";
            osc.frequency.value = freq;
            og.gain.value = 0.25;
            // LFO vibrato
            const lfo = audioCtx.createOscillator();
            const lg = audioCtx.createGain();
            lfo.frequency.value = 5;
            lg.gain.value = 2;
            lfo.connect(lg);
            lg.connect(osc.frequency);
            lfo.start();
            osc.connect(og);
            og.connect(gainNode);
            osc.start();
            oscNodes.push(osc, lfo);
          });
          chordIdx = (chordIdx + 1) % 4;
          setTimeout(playChord, 3000);
        };
        playChord();
      }

      function toggleMute() {
        if (!audioCtx) return;
        musicMuted = !musicMuted;
        gainNode.gain.setTargetAtTime(
          musicMuted ? 0 : 0.06,
          audioCtx.currentTime,
          0.1,
        );
        return musicMuted;
      }

      function initCursor() {
        const dot = document.getElementById("cursor-dot");

        let mx = 0,

        document.addEventListener("mousemove", (e) => {

      // ============================================================
      // GLOBAL AUDIO CONTEXT — music persists across page changes
      // ============================================================
      const AudioCtx = React.createContext(null);

      function AudioProvider({ children }) {
        const [trackIdx, setTrackIdx] = useState(0);
        const [playing, setPlaying] = useState(false);
        const [progress, setProgress] = useState(0);
        const [volume, setVolume] = useState(70);
        const [currentTime, setCurrentTime] = useState(0);
        const [duration, setDuration] = useState(0);
        const [audioError, setAudioError] = useState(false);
        const audioRef = useRef(null);
        const track = TRACKS[trackIdx];

        useEffect(() => {
          if (!audioRef.current) audioRef.current = new Audio();
          const audio = audioRef.current;
          setAudioError(false);
          setCurrentTime(0);
          setProgress(0);
          setDuration(0);
          audio.src = track.file;
          audio.volume = volume / 100;
          audio.load();
          const onTimeUpdate = () => {
            setCurrentTime(audio.currentTime);
            if (audio.duration)
              setProgress((audio.currentTime / audio.duration) * 100);
          };
          const onLoadedMetadata = () => setDuration(audio.duration);
          const onEnded = () => {
            setPlaying(false);
            setProgress(0);
            setCurrentTime(0);
          };
          const onError = () => setAudioError(true);
          audio.addEventListener("timeupdate", onTimeUpdate);
          audio.addEventListener("loadedmetadata", onLoadedMetadata);
          audio.addEventListener("ended", onEnded);
          audio.addEventListener("error", onError);
          return () => {
            audio.removeEventListener("timeupdate", onTimeUpdate);
            audio.removeEventListener("loadedmetadata", onLoadedMetadata);
            audio.removeEventListener("ended", onEnded);
            audio.removeEventListener("error", onError);
          };
        }, [trackIdx]);

        useEffect(() => {
          if (!audioRef.current) return;
          if (playing) audioRef.current.play().catch(() => setAudioError(true));
          else audioRef.current.pause();
        }, [playing]);
        useEffect(() => {
          if (audioRef.current) audioRef.current.volume = volume / 100;
        }, [volume]);

        const seekTo = (pct) => {
          if (!audioRef.current) return;
          audioRef.current.currentTime =
            (pct / 100) * (audioRef.current.duration || 0);
          setProgress(pct);
        };
        const skipBy = (sec) => {
          if (!audioRef.current) return;
          audioRef.current.currentTime = Math.max(
            0,
            Math.min(
              audioRef.current.duration || 9999,
              audioRef.current.currentTime + sec,
            ),
          );
        };
        const prevTrack = () => {
          setPlaying(false);
          setTrackIdx((i) => (i - 1 + TRACKS.length) % TRACKS.length);
        };
        const nextTrack = () => {
          setPlaying(false);
          setTrackIdx((i) => (i + 1) % TRACKS.length);
        };
        const selectTrack = (i) => {
          setPlaying(false);
          setTrackIdx(i);
          setTimeout(() => setPlaying(true), 100);
        };

        return (
          <AudioCtx.Provider
            value={{
              trackIdx,
              playing,
              setPlaying,
              progress,
              volume,
              setVolume,
              currentTime,
              duration,
              audioError,
              track,
              seekTo,
              skipBy,
              prevTrack,
              nextTrack,
              selectTrack,
            }}
          >
            {children}
          </AudioCtx.Provider>
        );
      }

      // --- PROMISES PAGE ---
      function PromisesPage() {
        const [promises, setPromises] = useState(() => {
          const s = localStorage.getItem("ps_promises");
          return s ? JSON.parse(s) : PROMISES_DEFAULT;
        });
        const [newPromise, setNewPromise] = useState("");

        const save = (ps) => {
          setPromises(ps);
          localStorage.setItem("ps_promises", JSON.stringify(ps));
        };

        const toggle = (id) => {
          const ps = promises.map((p) =>
            p.id === id ? { ...p, done: !p.done } : p,
          );
          save(ps);
          const p = ps.find((p) => p.id === id);
          if (p.done) burst();
        };

        const burst = () => {
          const canvas = document.getElementById("fireworks-canvas");
          canvas.style.display = "block";
          const ctx = canvas.getContext("2d");
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
          const ps = [];
          const x = window.innerWidth / 2,
            y = window.innerHeight / 2;
          for (let i = 0; i < 40; i++) {
            const a = ((Math.PI * 2) / 40) * i,
              sp = Math.random() * 5 + 2;
            ps.push({
              x,
              y,
              vx: Math.cos(a) * sp,
              vy: Math.sin(a) * sp,
              life: 1,
              decay: 0.025,
              color: ["#FF2D6B", "#FFD700", "#8B5CF6"][
                Math.floor(Math.random() * 3)
              ],
            });
          }
          let f = 0;
          const animate = () => {
            ctx.fillStyle = "rgba(10,10,24,0.2)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ps.forEach((p, i) => {
              p.x += p.vx;
              p.y += p.vy;
              p.vy += 0.1;
              p.life -= p.decay;
              ctx.globalAlpha = p.life;
              ctx.fillStyle = p.color;
              ctx.beginPath();
              ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
              ctx.fill();
            });
            ctx.globalAlpha = 1;
            f++;
            if (f < 80) requestAnimationFrame(animate);
            else {
              canvas.style.display = "none";
              ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
          };
          animate();
        };

        const addPromise = () => {
          if (!newPromise.trim()) return;
          const ps = [
            ...promises,
            { id: Date.now(), icon: "💫", text: newPromise, done: false },
          ];
          save(ps);
          setNewPromise("");
        };

        const doneCount = promises.filter((p) => p.done).length;
        const pct = Math.round((doneCount / promises.length) * 100);
        const r = 90,
          circ = 2 * Math.PI * r;
        const dash = circ * (pct / 100);

        return (
          <div className="page page-transition">
            <div className="section-container">
              <div
                className="section-heading-wrap"
                style={{ textAlign: "center" }}
              >
                <h2 className="section-title rose-gold">Our Promises 🤝</h2>
                <p className="section-sub">words we keep</p>
              </div>
              <div className="promise-ring-wrap">
                <svg width="200" height="200" viewBox="0 0 200 200">
                  <circle
                    cx="100"
                    cy="100"
                    r={r}
                    fill="none"
                    stroke="rgba(255,255,255,0.08)"
                    strokeWidth="8"
                  />
                  <circle
                    cx="100"
                    cy="100"
                    r={r}
                    fill="none"
                    stroke="url(#ringGrad)"
                    strokeWidth="8"
                    strokeLinecap="round"
                    strokeDasharray={`${dash} ${circ - dash}`}
                    strokeDashoffset={circ / 4}
                    style={{ transition: "stroke-dasharray 0.8s ease" }}
                  />
                  <defs>
                    <linearGradient
                      id="ringGrad"
                      x1="0%"
                      y1="0%"
                      x2="100%"
                      y2="0%"
                    >
                      <stop offset="0%" stopColor="#FF2D6B" />
                      <stop offset="100%" stopColor="#FFD700" />
                    </linearGradient>
                  </defs>
                  <text
                    x="100"
                    y="96"
                    textAnchor="middle"
                    fill="#fff"
                    style={{
                      fontFamily: "'Dancing Script',cursive",
                      fontSize: 28,
                      fontWeight: 700,
                    }}
                  >
                    {pct}%
                  </text>
                  <text
                    x="100"
                    y="116"
                    textAnchor="middle"
                    fill="rgba(255,255,255,0.5)"
                    style={{ fontFamily: "'Nunito',sans-serif", fontSize: 13 }}
                  >
                    kept
                  </text>
                </svg>
              </div>
              <div className="promise-list">
                {promises.map((p) => (
                  <div
                    key={p.id}
                    className={`promise-item${p.done ? " done" : ""}`}
                    onClick={() => toggle(p.id)}
                  >
                    <div className="promise-icon">{p.icon}</div>
                    <div
                      className="promise-text"
                      style={{
                        textDecoration: p.done ? "line-through" : "none",
                        color: p.done ? "rgba(255,255,255,0.5)" : "var(--text)",
                      }}
                    >
                      {p.text}
                    </div>
                    <div className="promise-check">{p.done ? "✓" : ""}</div>
                  </div>
                ))}
              </div>
              <div className="promise-add">
                <input
                  className="promise-input"
                  value={newPromise}
                  onChange={(e) => setNewPromise(e.target.value)}
                  placeholder="Add your own promise..."
                  onKeyDown={(e) => e.key === "Enter" && addPromise()}
                />
                <button
                  className="btn-primary"
                  style={{ padding: "12px 20px", whiteSpace: "nowrap" }}
                  onClick={addPromise}
                >
                  Add +
                </button>
              </div>
            </div>
          </div>
        );
      }
