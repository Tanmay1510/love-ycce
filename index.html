      // --- QUIZ PAGE ---
      function QuizPage() {
        const [qIdx, setQIdx] = useState(0);
        const [selected, setSelected] = useState(null);
        const [score, setScore] = useState(0);
        const [done, setDone] = useState(false);

        const q = QUIZ_QUESTIONS[qIdx];

        const choose = (i) => {
          if (selected !== null) return;
          setSelected(i);
          const correct = i === q.ans;
          if (correct) setScore((s) => s + 1);
          setTimeout(() => {
            if (qIdx + 1 < QUIZ_QUESTIONS.length) {
              setQIdx((qi) => qi + 1);
              setSelected(null);
            } else setDone(true);
          }, 1500);
        };

        const restart = () => {
          setQIdx(0);
          setSelected(null);
          setScore(0);
          setDone(false);
        };

        const getMsg = (s) => {
          if (s === 10)
            return {
              e: "💯",
              m: "Perfect! You two are made for each other — YCCE se le ke forever tak! ♥",
            };
          if (s >= 7)
            return {
              e: "🌟",
              m: "Almost perfect! Piyush aur Saniya ka pyaar sach mein khas hai!",
            };
          if (s >= 4)
            return {
              e: "💕",
              m: "Not bad! Par thoda aur dhyan do apni kahani pe, yaar!",
            };
          return {
            e: "😅",
            m: "Arre! Apni love story dobara padh lo — bahut important hai!",
          };
        };

        useEffect(() => {
          if (done) {
            const best = parseInt(localStorage.getItem("ps_quiz_score") || "0");
            if (score > best) localStorage.setItem("ps_quiz_score", score);
          }
        }, [done, score]);

        return (
          <div className="page page-transition">
            <div className="section-container">
              <div
                className="section-heading-wrap"
                style={{ textAlign: "center" }}
              >
                <h2 className="section-title rose-gold">Love Quiz 💘</h2>
                <p className="section-sub">how well do you know our story?</p>
              </div>
              <div className="quiz-card">
                {!done ? (
                  <>
                    <div className="quiz-progress-bar">
                      <div
                        className="quiz-progress-fill"
                        style={{ width: `${((qIdx + 1) / 10) * 100}%` }}
                      />
                    </div>
                    <div className="quiz-label">Question {qIdx + 1} of 10</div>
                    <div className="quiz-question">{q.q}</div>
                    <div className="quiz-options">
                      {q.opts.map((opt, i) => {
                        let cls = "quiz-option";
                        if (selected !== null) {
                          if (i === q.ans) cls += " correct";
                          else if (i === selected && i !== q.ans)
                            cls += " wrong";
                        }
                        return (
                          <button
                            key={i}
                            className={cls}
                            onClick={() => choose(i)}
                            disabled={selected !== null}
                          >
                            {opt}
                          </button>
                        );
                      })}
                    </div>
                  </>
                ) : (
                  <>
                    <div className="quiz-result">
                      {(() => {
                        const { e, m } = getMsg(score);
                        return (
                          <>
                            <div className="quiz-result-emoji">{e}</div>
                            <div
                              style={{
                                fontFamily: "'Dancing Script',cursive",
                                fontSize: "2.5rem",
                                marginBottom: 8,
                              }}
                              className="rose-gold"
                            >
                              {score}/10
                            </div>
                            <div className="quiz-result-msg">{m}</div>
                            <button className="btn-primary" onClick={restart}>
                              Try Again 💕
                            </button>
                          </>
                        );
                      })()}
                    </div>
                  </>
                )}
              </div>
            </div>
          </div>
        );
      }

      // --- COUNTDOWN PAGE ---
      function CountdownPage() {
        const [date, setDate] = useState(
          () => localStorage.getItem("ps_anniversary") || "2024-01-01",
        );
        const [now, setNow] = useState(new Date());
        const [factIdx, setFactIdx] = useState(0);
        const [factVisible, setFactVisible] = useState(true);

        useEffect(() => {
          const iv = setInterval(() => setNow(new Date()), 1000);
          return () => clearInterval(iv);
        }, []);

        useEffect(() => {
          const iv = setInterval(() => {
            setFactVisible(false);
            setTimeout(() => {
              setFactIdx((i) => (i + 1) % LOVE_FACTS.length);
              setFactVisible(true);
            }, 500);
          }, 5000);
          return () => clearInterval(iv);
        }, []);

        const start = new Date(date);
        const diff = Math.max(0, now - start);
        const totalSec = Math.floor(diff / 1000);
        const years = Math.floor(diff / (1000 * 60 * 60 * 24 * 365.25));
        const months = Math.floor(diff / (1000 * 60 * 60 * 24 * 30.44));
        const totalDays = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor(
          (diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60),
        );
        const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const secs = Math.floor((diff % (1000 * 60)) / 1000);

        const handleDateChange = (e) => {
          setDate(e.target.value);
          localStorage.setItem("ps_anniversary", e.target.value);
        };

        const units = [
          { label: "Years", val: years },
          { label: "Months", val: months },
          { label: "Days", val: totalDays },
          { label: "Hours", val: hours },
          { label: "Minutes", val: mins },
          { label: "Seconds", val: secs },
        ];

        return (
          <div className="page page-transition">
            <div className="section-container">
              <div
                className="section-heading-wrap"
                style={{ textAlign: "center" }}
              >
                <h2 className="section-title rose-gold">Our Countdown 💫</h2>
                <p className="section-sub">
                  counting every precious moment together
                </p>
              </div>
              <div style={{ textAlign: "center", marginBottom: 28 }}>
                <label
                  style={{
                    fontSize: "0.8rem",
                    color: "var(--muted)",
                    display: "block",
                    marginBottom: 8,
                  }}
                >
                  Anniversary Date
                </label>
                <input
                  type="date"
                  value={date}
                  onChange={handleDateChange}
                  style={{
                    background: "var(--glass)",
                    border: "1px solid var(--border)",
                    borderRadius: 10,
                    padding: "10px 16px",
                    color: "var(--text)",
                    fontFamily: "'Nunito',sans-serif",
                    outline: "none",
                  }}
                />
              </div>
              <div className="countdown-grid">
                {units.map((u) => (
                  <div key={u.label} className="countdown-unit">
                    <div className="countdown-num">
                      {u.val.toString().padStart(2, "0")}
                    </div>
                    <div className="countdown-unit-label">{u.label}</div>
                  </div>
                ))}
              </div>
              <div style={{ textAlign: "center", marginBottom: 28 }}>
                <div className="section-sub" style={{ marginBottom: 4 }}>
                  Milestones
                </div>
              </div>
              <div className="milestones">
                {MILESTONES.map((ms) => {
                  const passed = totalDays >= ms.days;
                  const daysLeft = ms.days - totalDays;
                  return (
                    <div
                      key={ms.label}
                      className={`milestone${passed ? " passed" : ""}`}
                    >
                      <div>{passed ? "✅" : "🔜"}</div>
                      <div className="milestone-label">{ms.label}</div>
                      <div className="milestone-status">
                        {passed ? "✓ Reached" : `${daysLeft} days away`}
                      </div>
                    </div>
                  );
                })}
              </div>
              <div
                className="love-fact"
                style={{ opacity: factVisible ? 1 : 0 }}
              >
                {LOVE_FACTS[factIdx]}
              </div>
            </div>
          </div>
        );
      }

      // ============================================================
      // MINI-BOX TUTORIAL — always shown on startup, flies to nav items
      // ============================================================
      function Tutorial({ isOpen, onClose, setPage }) {
        const [step, setStep] = useState(0);
        const [phase, setPhase] = useState("hidden"); // hidden | show | fly
        const [targetPos, setTargetPos] = useState({ x: 0, y: 0 });

        const steps = [
          {
            icon: "💗",
            title: "Welcome to P ♥ S",
            desc: "Your private love story — built with love for you and Saniya. 🌙",
            target: null,
            color: "#ff2d6b",
          },
          {
            icon: "📸",
            title: "Memories",
            desc: "Relive every precious moment you've shared together.",
            target: "Memories",
            color: "#a855f7",
          },
          {
            icon: "📅",
            title: "Timeline",
            desc: "Your love story told chapter by chapter.",
            target: "Timeline",
            color: "#8b5cf6",
          },
          {
            icon: "💬",
            title: "Chat with Saniya",
            desc: "She's always here — Hinglish, love, and all. Powered by AI.",
            target: "Chat",
            color: "#ec4899",
          },
          {
            icon: "📝",
            title: "Love Notes",
            desc: "Pin little handwritten notes to each other, forever.",
            target: "Notes",
            color: "#f97316",
          },
          {
            icon: "🤝",
            title: "Promises",
            desc: "Keep track of every promise you've made.",
            target: "Promises",
            color: "#10b981",
          },
          {
            icon: "🎵",
            title: "Our Music",
            desc: "Music keeps playing even when you switch pages.",
            target: "Music",
            color: "#ffd700",
          },
          {
            icon: "💘",
            title: "Love Quiz",
            desc: "Test how well you know your own story!",
            target: "Quiz",
            color: "#ff2d6b",
          },
          {
            icon: "✨",
            title: "You're all set!",
            desc: "Everything is yours. Begin exploring together. 🌸",
            target: null,
            color: "#ffd700",
          },
        ];

        const isLast = step === steps.length - 1;
        const cur = steps[step];

        // Show card on open
        useEffect(() => {
          if (isOpen) {
            setStep(0);
            setPhase("hidden");
            setTimeout(() => setPhase("show"), 80);
          }
        }, [isOpen]);

        const getNavPos = (label) => {
          const btn = Array.from(document.querySelectorAll(".nav-link")).find(
            (el) => el.textContent.trim() === label,
          );
          if (btn) {
            const r = btn.getBoundingClientRect();
            return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
          }
          return null;
        };

        const advance = () => {
          if (phase !== "show") return;
          if (isLast) {
            onClose();
            return;
          }
          const next = steps[step + 1];
          if (next.target) {
            // Navigate to that page so the tutorial shows it in context
            setPage(next.target);
            const pos = getNavPos(next.target);
            if (pos) {
              setTargetPos(pos);
              setPhase("fly");
              setTimeout(() => {
                setStep((s) => s + 1);
                setPhase("hidden");
                setTimeout(() => setPhase("show"), 60);
              }, 480);
              return;
            }
          }
          setPhase("hidden");
          setTimeout(() => {
            setStep((s) => s + 1);
            setPhase("show");
          }, 220);
        };

        if (!isOpen) return null;

        const cx = window.innerWidth / 2;
        const cy = window.innerHeight / 2;
        const flying = phase === "fly";
        const visible = phase === "show";

        return (
          <>
            {/* Backdrop */}
            <div
              style={{
                position: "fixed",
                inset: 0,
                zIndex: 9400,
                background: "rgba(0,0,0,0.75)",
                backdropFilter: "blur(4px)",
                opacity: visible ? 1 : 0,
                transition: "opacity 0.3s ease",
                pointerEvents: visible ? "auto" : "none",
              }}
              onClick={onClose}
            />

            {/* Mini card */}
            <div
              style={{
                position: "fixed",
                zIndex: 9500,
                left: flying ? targetPos.x : cx,
                top: flying ? targetPos.y : cy,
                transform: flying
                  ? "translate(-50%,-50%) scale(0.12) rotate(4deg)"
                  : visible
                    ? "translate(-50%,-50%) scale(1)"
                    : "translate(-50%,-50%) scale(0.5)",
                opacity: flying ? 0 : visible ? 1 : 0,
                transition: flying
                  ? "all 0.48s cubic-bezier(0.4,0,0.6,1)"
                  : "all 0.38s cubic-bezier(0.34,1.56,0.64,1)",
                width: 300,
                background: "rgba(10,10,24,0.97)",
                backdropFilter: "blur(28px)",
                border: `1px solid ${cur.color}44`,
                borderRadius: 22,
                padding: "28px 28px 22px",
                boxShadow: `0 0 0 1px ${cur.color}18, 0 32px 80px rgba(0,0,0,0.8), 0 0 80px ${cur.color}18`,
                fontFamily: "'Nunito',sans-serif",
                textAlign: "center",
                pointerEvents: visible ? "auto" : "none",
              }}
            >
              {/* Top glow */}
              <div
                style={{
                  position: "absolute",
                  inset: 0,
                  borderRadius: 22,
                  pointerEvents: "none",
                  background: `radial-gradient(ellipse at 50% -10%, ${cur.color}22 0%, transparent 65%)`,
                }}
              />

              {/* Icon */}
              <div
                style={{
                  fontSize: "3rem",
                  lineHeight: 1,
                  marginBottom: 14,
                  filter: `drop-shadow(0 0 20px ${cur.color}88)`,
                  animation: visible ? "tCardIcon 0.5s ease" : "none",
                }}
              >
                {cur.icon}
              </div>

              {/* Eyebrow */}
              <div
                style={{
                  fontSize: "0.6rem",
                  letterSpacing: "3.5px",
                  textTransform: "uppercase",
                  color: cur.color,
                  marginBottom: 6,
                  fontWeight: 700,
                }}
              >
                {step === 0
                  ? "WELCOME"
                  : step === steps.length - 1
                    ? "READY"
                    : `FEATURE ${step} OF ${steps.length - 2}`}
              </div>

              {/* Title */}
              <div
                style={{
                  fontFamily: "'Dancing Script',cursive",
                  fontStyle: "italic",
                  fontSize: "1.2rem",
                  fontWeight: 700,
                  color: "#fff",
                  marginBottom: 8,
                }}
              >
                {cur.title}
              </div>

              {/* Desc */}
              <p
                style={{
                  fontSize: "0.81rem",
                  color: "rgba(255,255,255,0.52)",
                  lineHeight: 1.65,
                  marginBottom: 20,
                }}
              >
                {cur.desc}
              </p>

              {/* Progress bar */}
              <div
                style={{
                  height: 3,
                  background: "rgba(255,255,255,0.07)",
                  borderRadius: 2,
                  marginBottom: 18,
                  overflow: "hidden",
                }}
              >
                <div
                  style={{
                    height: "100%",
                    borderRadius: 2,
                    background: `linear-gradient(90deg,${cur.color},${cur.color}77)`,
                    width: `${((step + 1) / steps.length) * 100}%`,
                    transition: "width 0.4s ease",
                  }}
                />
              </div>

              {/* Next button */}
              <button
                onClick={advance}
                style={{
                  width: "100%",
                  padding: "11px 0",
                  borderRadius: 50,
                  border: "none",
                  background: `linear-gradient(135deg,${cur.color},${cur.color}99)`,
                  color: "#fff",
                  fontSize: "0.87rem",
                  fontWeight: 600,
                  cursor: "pointer",
                  letterSpacing: "0.3px",
                  boxShadow: `0 6px 28px ${cur.color}40`,
                  transition: "transform 0.15s, box-shadow 0.15s",
                }}
                onMouseEnter={(e) => {
                  e.currentTarget.style.transform = "scale(1.03)";
                  e.currentTarget.style.boxShadow = `0 8px 36px ${cur.color}66`;
                }}
                onMouseLeave={(e) => {
                  e.currentTarget.style.transform = "scale(1)";
                  e.currentTarget.style.boxShadow = `0 6px 28px ${cur.color}40`;
                }}
              >
                {isLast ? "Begin Our Story ✨" : "Next →"}
              </button>

              {/* Skip */}
              <button
                onClick={onClose}
                style={{
                  marginTop: 10,
                  background: "none",
                  border: "none",
                  color: "rgba(255,255,255,0.28)",
                  fontSize: "0.73rem",
                  cursor: "pointer",
                  width: "100%",
                  transition: "color 0.2s",
                }}
                onMouseEnter={(e) =>
                  (e.target.style.color = "rgba(255,255,255,0.6)")
                }
                onMouseLeave={(e) =>
                  (e.target.style.color = "rgba(255,255,255,0.28)")
                }
              >
                Skip tour
              </button>
            </div>

            <style>{`
              @keyframes tCardIcon {
                from { transform: scale(0.5) translateY(10px); opacity:0; }
                to   { transform: scale(1) translateY(0);    opacity:1; }
              }
            `}</style>
          </>
        );
      }

      // ============================================================
      // APP ROOT
      // ============================================================
      function App() {
        const [currentPage, setPage] = useState("Home");
        const [muted, setMuted] = useState(false);
        // Always show tutorial on every page load (no localStorage gate)
        const [showTutorial, setShowTutorial] = useState(true);

        useEffect(() => {
          initParticleCanvas();
          initCursor();
          initLoveMeter();
          initKonami();
        }, []);

        const pages = {
          Home: <HomePage setPage={setPage} />,
          Memories: <MemoriesPage />,
          Timeline: <TimelinePage />,
          Chat: <ChatPage />,
          Notes: <NotesPage />,
          Promises: <PromisesPage />,
          Music: <MusicPage />,
          Quiz: <QuizPage />,
          Countdown: <CountdownPage />,
        };

        return (
          <>
            <Tutorial
              isOpen={showTutorial}
              onClose={() => setShowTutorial(false)}
              setPage={setPage}
            />
            <NavBar
              currentPage={currentPage}
              setPage={setPage}
              muted={muted}
              setMuted={setMuted}
            />
            <div key={currentPage} style={{ position: "relative", zIndex: 1 }}>
              {pages[currentPage]}
            </div>
          </>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(
        <AudioProvider>
          <App />
        </AudioProvider>,
      );
    </script>
  </body>
</html>
